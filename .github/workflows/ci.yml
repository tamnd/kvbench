name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-flight run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test on Linux and macOS. gofmt and vet run here too so a
  # formatting slip fails fast on both platforms. The default build is pure Go
  # (CGO_ENABLED=0); the cgo-only adapters (LMDB, libmdbx, RocksDB) are behind the
  # cgo_engines tag and are compiled in the separate cgo job below, so this job
  # needs no C toolchain or system library.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./...
      - name: build
        env:
          CGO_ENABLED: "0"
        run: go build ./...
      # The race detector requires cgo; the build above already proves the
      # pure-Go path compiles.
      - name: test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  # Build the cgo adapters (LMDB, libmdbx, RocksDB), which the pure-Go jobs above
  # skip, so a break in an adapter or a binding bump is caught on both platforms.
  # LMDB and libmdbx bundle their C source, a compiler is enough. RocksDB links a
  # host librocksdb, which grocksdb's build.sh provisions at the exact version the
  # binding tracks; the result is cached so that build is paid once per key.
  cgo:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential wget
      - name: build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake wget
      - name: cache librocksdb
        id: rocksdb-cache
        uses: actions/cache@v4
        with:
          path: ~/rocksdb-static
          key: rocksdb-10.10.1-grocksdb-v1.10.8-${{ runner.os }}-${{ runner.arch }}
      - name: build librocksdb (cache miss)
        if: steps.rocksdb-cache.outputs.cache-hit != 'true'
        run: |
          go mod download github.com/linxGnu/grocksdb
          GROCKSDB=$(go list -m -f '{{.Dir}}' github.com/linxGnu/grocksdb)
          bash "$GROCKSDB/build.sh" "$HOME/rocksdb-static"
      - name: build and smoke (cgo_engines)
        env:
          CGO_ENABLED: "1"
        run: |
          export CGO_CFLAGS="-I$HOME/rocksdb-static/include"
          if [ "$RUNNER_OS" = "macOS" ]; then
            export CGO_LDFLAGS="-L$HOME/rocksdb-static/lib -lrocksdb -lsnappy -llz4 -lz -lzstd -lc++"
          else
            export CGO_LDFLAGS="-L$HOME/rocksdb-static/lib -lrocksdb -lsnappy -llz4 -lz -lzstd -lstdc++ -lm -ldl -lpthread"
          fi
          go build -tags cgo_engines ./...
          go build -tags cgo_engines -o bin/kvbench ./cmd/kvbench
          ./bin/kvbench run \
            --engines lmdb,libmdbx,rocksdb,kv-f2-durable \
            --workloads readrandom,fillrandom \
            --durability OFF --conc 1 --cardinality 5000 --ops 10000 --reps 1 \
            --out results/cgo-smoke
      - name: compile-check (speedb_engines)
        env:
          CGO_ENABLED: "1"
        # Speedb shares the grocksdb engine with rocksdb and is ABI-compatible, so
        # it compiles and links against the stock librocksdb here. This only guards
        # the speedb_engines code from rotting; it is not run, because that would
        # be RocksDB mislabeled. Real Speedb numbers come from a host that provides
        # Speedb's drop-in library as librocksdb.
        run: |
          export CGO_CFLAGS="-I$HOME/rocksdb-static/include"
          if [ "$RUNNER_OS" = "macOS" ]; then
            export CGO_LDFLAGS="-L$HOME/rocksdb-static/lib -lrocksdb -lsnappy -llz4 -lz -lzstd -lc++"
          else
            export CGO_LDFLAGS="-L$HOME/rocksdb-static/lib -lrocksdb -lsnappy -llz4 -lz -lzstd -lstdc++ -lm -ldl -lpthread"
          fi
          go build -tags speedb_engines ./...
          go build -tags speedb_engines -o bin/kvbench-speedb ./cmd/kvbench

  # Build the network adapters (redis, valkey, dragonfly, aki), which the default
  # build skips, so a break in the respnet launcher or an adapter is caught on
  # both platforms. The build needs no server binary; the Linux smoke installs
  # redis-server from apt and drives the redis engine, exercising the shared
  # launch-and-go-redis path end to end. valkey, dragonfly and aki are not in the
  # base image, so they are compile-checked here and benchmarked on the bench host.
  network:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: build (network_engines)
        env:
          CGO_ENABLED: "0"
        run: go build -tags network_engines ./...
      - name: redis smoke (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "0"
        run: |
          sudo apt-get update && sudo apt-get install -y redis-server
          go build -tags network_engines -o bin/kvbench ./cmd/kvbench
          ./bin/kvbench run \
            --engines redis \
            --workloads readrandom,fillrandom \
            --durability OFF --conc 1 --cardinality 5000 --ops 10000 --reps 1 \
            --out results/network-smoke

  # End-to-end smoke: build the runner and drive a tiny sweep over the in-memory
  # floor and ceilings plus the kv f2 faces. This is the gate that matters for a
  # benchmark repo: a refactor that keeps every unit test green but breaks the
  # harness wiring shows up here as a failed run.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: bench smoke
        env:
          CGO_ENABLED: "0"
        run: |
          go build -o bin/kvbench ./cmd/kvbench
          ./bin/kvbench run \
            --engines devnull,swiss,otter,faster,kv,kv-f2,kv-f2-durable \
            --workloads readrandom,fillrandom \
            --durability OFF --conc 1 --cardinality 5000 --ops 10000 --reps 1 \
            --out results/smoke

  # golangci-lint bundles staticcheck, govet, ineffassign, errcheck, unused and
  # more, so it is the main quality gate.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.1

  # Scan the module and its dependencies for known vulnerabilities.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Confirm go.mod and go.sum are tidy: a PR that adds an import without running
  # go mod tidy fails here instead of breaking a later release.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
