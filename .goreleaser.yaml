# GoReleaser builds the kvbench runner for the common desktop and server
# targets, packs each into an archive, and ships checksums and a per-archive
# SBOM. The build is pure Go (CGO disabled), so the cgo-only LMDB adapter is
# left out of the released binary; it is a build-tag opt-in for local runs.
version: 2

project_name: kvbench

before:
  hooks:
    - go mod tidy

builds:
  - id: kvbench
    main: ./cmd/kvbench
    binary: kvbench
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - id: kvbench
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
